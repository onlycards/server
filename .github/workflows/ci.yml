name: CI

on:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm i

      - name: Lint
        run: npm run lint

      - name: Check TypeScript
        run: npm run ts

      - name: Build
        run: npm run ts
